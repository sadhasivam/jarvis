[browser]
gatherUsageStats = false

[client]
showErrorDetails = true

[server]
enableStaticServing = true
headless = true
address = "0.0.0.0"
port = 8501
enableCORS = false
enableXsrfProtection = false

[theme]
# Clean Anthropic-inspired palette
primaryColor = "#d97757"
backgroundColor = "#faf9f0"
secondaryBackgroundColor = "#e8e6dc"
textColor = "#141413"
font = "sans serif"
