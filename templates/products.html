{% extends "base.html" %}

{% block title %}Products - StockMind{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-semibold text-brand-slate">Products</h2>
        <div class="text-sm text-brand-gray">
            Product catalog and performance
        </div>
    </div>

    <!-- Products Table Container -->
    <div class="bg-white rounded-lg shadow-sm border border-brand-beige">
        <div id="products-container"
             hx-get="/api/products"
             hx-trigger="load"
             hx-indicator="#loading-products">

            <!-- Loading State -->
            <div id="loading-products" class="htmx-indicator p-8 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-brand-coral"></div>
                <p class="mt-2 text-brand-gray">Loading products...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
