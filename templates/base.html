<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StockMind - Inventory Markdown Engine{% endblock %}</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- Alpine.js for micro-interactions -->
    <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-coral': '#d97757',
                        'brand-cream': '#faf9f0',
                        'brand-beige': '#e8e6dc',
                        'brand-slate': '#141413',
                        'brand-gray': '#87867f',
                    }
                }
            }
        }
    </script>

    <!-- Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
        }

        /* HTMX loading indicators */
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-indicator {
            display: none;
        }

        /* Smooth transitions */
        .htmx-swapping {
            opacity: 0;
            transition: opacity 200ms ease-out;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-brand-cream text-brand-slate antialiased">

    <!-- Navigation -->
    <nav class="bg-white border-b border-brand-beige">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-semibold text-brand-slate">StockMind</h1>
                    <p class="ml-4 text-sm text-brand-gray">Inventory Markdown Engine</p>
                </div>

                <div class="flex items-center space-x-4">
                    <div class="text-sm">
                        <span class="text-brand-gray">Inventory:</span>
                        <span class="font-semibold text-brand-coral" id="inventory-count">
                            {{ inventory_count|default('--') }} SKUs
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Tab Navigation -->
    <div class="bg-white border-b border-brand-beige">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex space-x-8" aria-label="Tabs">
                <a href="/"
                   class="tab-link border-b-2 py-4 px-1 text-sm font-medium {% if active_tab == 'orders' %}border-brand-coral text-brand-coral{% else %}border-transparent text-brand-gray hover:text-brand-slate hover:border-brand-gray{% endif %}">
                    📦 Orders
                </a>
                <a href="/products"
                   class="tab-link border-b-2 py-4 px-1 text-sm font-medium {% if active_tab == 'products' %}border-brand-coral text-brand-coral{% else %}border-transparent text-brand-gray hover:text-brand-slate hover:border-brand-gray{% endif %}">
                    📱 Products
                </a>
                <a href="/customers"
                   class="tab-link border-b-2 py-4 px-1 text-sm font-medium {% if active_tab == 'customers' %}border-brand-coral text-brand-coral{% else %}border-transparent text-brand-gray hover:text-brand-slate hover:border-brand-gray{% endif %}">
                    👥 Customers
                </a>
                <a href="/inventory"
                   class="tab-link border-b-2 py-4 px-1 text-sm font-medium {% if active_tab == 'inventory' %}border-brand-coral text-brand-coral{% else %}border-transparent text-brand-gray hover:text-brand-slate hover:border-brand-gray{% endif %}">
                    📊 Inventory
                </a>
                <a href="/promotion-engine"
                   class="tab-link border-b-2 py-4 px-1 text-sm font-medium {% if active_tab == 'promotion' %}border-brand-coral text-brand-coral{% else %}border-transparent text-brand-gray hover:text-brand-slate hover:border-brand-gray{% endif %}">
                    🎯 Promotion Engine
                </a>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50">
        <!-- Toasts will be inserted here via HTMX -->
    </div>

    <!-- Global HTMX config -->
    <script>
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            // Reinitialize any charts or components after HTMX swap
            if (typeof initializeCharts === 'function') {
                initializeCharts();
            }
        });

        // Show toast notifications
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-lg shadow-lg ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white transform transition-all duration-300`;
            toast.textContent = message;
            document.getElementById('toast-container').appendChild(toast);

            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
